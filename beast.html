<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
<title>BEAST — multiplayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --phosphor: #6dff8a;
  --beast: #ff4040;
  --wall: #5ac8ff;
  --block: #888;
  --amber: #ffb000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  color: var(--phosphor);
  font-family: 'VT323', 'Courier New', monospace;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
canvas {
  position: fixed;
  inset: 0;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
    rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px
  );
  pointer-events: none; z-index: 50;
}
.hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 60;
  display: flex;
  justify-content: space-between;
  padding: 6px 14px;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--amber);
  background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0));
  pointer-events: none;
}
.hud b { color: #fff; margin-left: 4px; }
.player-list {
  position: fixed;
  top: 36px; right: 14px;
  z-index: 55;
  font-size: 22px;
  text-align: right;
  line-height: 1.1;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.player-list span { display: inline-block; }
.controls {
  position: fixed;
  bottom: 14px;
  right: 14px;
  z-index: 60;
  display: grid;
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(3, 52px);
  gap: 4px;
}
@media (min-width: 900px) and (hover: hover) and (pointer: fine) {
  .controls { display: none; }
}
.btn {
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(109,255,138,0.4);
  color: var(--phosphor);
  font-family: inherit;
  font-size: 26px;
  cursor: pointer;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.btn:active { background: rgba(109,255,138,0.25); }
.btn.empty-btn { visibility: hidden; }
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.96);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  z-index: 200;
  text-align: center;
  padding: 24px;
  overflow-y: auto;
}
.overlay h1 {
  font-size: clamp(56px, 13vw, 110px);
  letter-spacing: 12px;
  color: var(--phosphor);
  margin-right: -12px;
}
.overlay p {
  font-size: clamp(16px, 4vw, 22px);
  color: var(--amber);
  line-height: 1.4;
  max-width: 400px;
}
.overlay .small {
  font-size: 16px;
  color: rgba(109,255,138,0.5);
  max-width: 360px;
}
.glyphs {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
  max-width: 420px;
  width: 100%;
}
.glyph-btn {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(109,255,138,0.3);
  color: var(--phosphor);
  font-family: inherit;
  font-size: 26px;
  padding: 8px 0;
  cursor: pointer;
  border-radius: 3px;
  line-height: 1;
}
.glyph-btn.taken {
  opacity: 0.2;
  cursor: not-allowed;
  border-color: #333;
  color: #555;
}
.glyph-btn.selected {
  background: rgba(109,255,138,0.25);
  border-color: var(--phosphor);
}
.colors {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.color-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid #333;
  cursor: pointer;
  padding: 0;
}
.color-btn.selected {
  border-color: #fff;
  transform: scale(1.15);
}
.start-btn {
  margin-top: 8px;
  padding: 12px 32px;
  background: transparent;
  border: 2px solid var(--phosphor);
  color: var(--phosphor);
  font-family: inherit;
  font-size: 26px;
  letter-spacing: 6px;
  cursor: pointer;
  border-radius: 4px;
}
.start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.start-btn:active:not(:disabled) { background: rgba(109,255,138,0.18); }
.hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud hidden" id="hud">
  <span>BEASTS<b id="beasts">0</b></span>
  <span>PLAYERS<b id="players">0</b></span>
</div>

<div class="player-list hidden" id="playerList"></div>

<div class="controls hidden" id="controls">
  <div class="btn empty-btn"></div>
  <button class="btn" data-dir="up">▲</button>
  <div class="btn empty-btn"></div>
  <button class="btn" data-dir="left">◀</button>
  <div class="btn empty-btn"></div>
  <button class="btn" data-dir="right">▶</button>
  <div class="btn empty-btn"></div>
  <button class="btn" data-dir="down">▼</button>
  <div class="btn empty-btn"></div>
</div>

<div class="overlay" id="joinOverlay">
  <h1>BEAST</h1>
  <p>Pick a glyph. The world grows for every visitor.</p>
  <div class="glyphs" id="glyphPicker"></div>
  <div class="colors" id="colorPicker"></div>
  <p class="small">Your position is shared with everyone on this page. Push blocks to crush beasts. Don't get touched.</p>
  <button class="start-btn" id="joinBtn" disabled>▶ JOIN</button>
</div>

<div class="overlay hidden" id="deathOverlay">
  <h1>DEAD</h1>
  <p>The beasts feed on what's left of you.</p>
  <button class="start-btn" id="rejoinBtn">▶ REJOIN</button>
</div>

<script>
// === CONSTANTS ===
const CELL = 28;
const BASE_COLS = 28, BASE_ROWS = 18;
const PER_PLAYER_COLS = 10, PER_PLAYER_ROWS = 5;
const MAX_COLS = 120, MAX_ROWS = 80;
const POLL_INTERVAL = 450;
const HEARTBEAT_INTERVAL = 1500;
const PLAYER_TIMEOUT = 9000;
const DEATH_LINGER = 4000;
const MIN_WRITE_INTERVAL = 200;

const EMPTY = 0, WALL = 1, BLOCK = 2;

const GLYPHS = ['H','X','Y','Z','★','◆','●','▲','♥','♣','♠','☼','Δ','Ω','Φ','Ψ','§','π','µ','∞','Ж','♪','¥','&'];
const COLORS = ['#6dff8a','#ff4040','#5ac8ff','#ffb000','#c879ff','#ff79c6','#50fa7b','#f1fa8c','#ff9500','#a0f0ff'];

const STORAGE_KEY = 'beast:world:v4';
const INPUT_KEY_PREFIX = 'beast:input:v1:';

// === LOCAL STATE ===
let myId = null, myGlyph = null, myColor = null;
let myAlive = false;
let state = null; // shared state mirror
let lastHeartbeat = 0;
let lastWrite = 0;
let writeQueued = false;
let lastBeastTick = 0;
let lastCleanTick = 0;
let localInputSeq = 0;

// === CANVAS SETUP ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function fitCanvas() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// === STORAGE WRAPPERS ===
async function readRemote() {
  try {
    const r = await window.storage.get(STORAGE_KEY, true);
    return r ? JSON.parse(r.value) : null;
  } catch (e) { return null; }
}
async function writeRemote(s) {
  try {
    s.updated = Date.now();
    await window.storage.set(STORAGE_KEY, JSON.stringify(s), true);
    lastWrite = Date.now();
  } catch (e) { console.warn('write failed', e); }
}
async function pushState() {
  if (!state) return;
  if (writeQueued) return;
  const elapsed = Date.now() - lastWrite;
  if (elapsed < MIN_WRITE_INTERVAL) {
    writeQueued = true;
    setTimeout(async () => {
      writeQueued = false;
      await writeRemote(state);
    }, MIN_WRITE_INTERVAL - elapsed);
    return;
  }
  await writeRemote(state);
}

function inputKey(playerId) {
  return `${INPUT_KEY_PREFIX}${playerId}`;
}
async function readPlayerInput(playerId) {
  try {
    const r = await window.storage.get(inputKey(playerId), true);
    return r ? JSON.parse(r.value) : null;
  } catch (e) { return null; }
}
async function writeMyInput(data) {
  if (!myId) return;
  const payload = { id: myId, ts: Date.now(), ...data };
  try {
    await window.storage.set(inputKey(myId), JSON.stringify(payload), true);
  } catch (e) { /* ignore */ }
}

// === WORLD GENERATION ===
function genId() { return Math.random().toString(36).substring(2, 10); }

function desiredSize(playerCount) {
  return {
    cols: Math.min(MAX_COLS, BASE_COLS + Math.max(0, playerCount-1) * PER_PLAYER_COLS),
    rows: Math.min(MAX_ROWS, BASE_ROWS + Math.max(0, playerCount-1) * PER_PLAYER_ROWS),
  };
}
function desiredBeasts(playerCount) {
  return 3 + playerCount * 2;
}

function makeGrid(cols, rows) {
  const grid = [];
  for (let y = 0; y < rows; y++) {
    const row = [];
    for (let x = 0; x < cols; x++) {
      if (x === 0 || y === 0 || x === cols-1 || y === rows-1) row.push(WALL);
      else row.push(EMPTY);
    }
    grid.push(row);
  }
  // Inner walls
  const wallCount = Math.floor(cols * rows * 0.025);
  for (let i = 0; i < wallCount; i++) {
    const x = 2 + Math.floor(Math.random() * (cols-4));
    const y = 2 + Math.floor(Math.random() * (rows-4));
    grid[y][x] = WALL;
  }
  // Push blocks (~32% density of inner area)
  const blockCount = Math.floor((cols-2) * (rows-2) * 0.32);
  let placed = 0, tries = 0;
  while (placed < blockCount && tries < 5000) {
    tries++;
    const x = 1 + Math.floor(Math.random() * (cols-2));
    const y = 1 + Math.floor(Math.random() * (rows-2));
    if (grid[y][x] === EMPTY) { grid[y][x] = BLOCK; placed++; }
  }
  return grid;
}

function spawnBeasts(grid, count, players) {
  const cols = grid[0].length, rows = grid.length;
  const out = [];
  let tries = 0;
  while (out.length < count && tries < 5000) {
    tries++;
    const x = 1 + Math.floor(Math.random() * (cols-2));
    const y = 1 + Math.floor(Math.random() * (rows-2));
    if (grid[y][x] !== EMPTY) continue;
    let near = false;
    for (const id in players) {
      const p = players[id];
      if (Math.abs(p.x-x) + Math.abs(p.y-y) < 8) { near = true; break; }
    }
    if (near) continue;
    if (out.some(b => b.x === x && b.y === y)) continue;
    out.push({x, y});
  }
  return out;
}

function findEmptyCell(grid, players, beasts) {
  const cols = grid[0].length, rows = grid.length;
  for (let i = 0; i < 1000; i++) {
    const x = 2 + Math.floor(Math.random() * (cols-4));
    const y = 2 + Math.floor(Math.random() * (rows-4));
    if (grid[y][x] === WALL) continue;
    if (beasts.some(b => b.x === x && b.y === y)) continue;
    if (Object.values(players).some(p => p.alive && p.x === x && p.y === y)) continue;
    grid[y][x] = EMPTY;
    // Clear orthogonal neighbors of blocks
    for (const [dx,dy] of [[1,0],[-1,0],[0,1],[0,-1]]) {
      const tx = x+dx, ty = y+dy;
      if (grid[ty] && grid[ty][tx] === BLOCK) grid[ty][tx] = EMPTY;
    }
    return {x, y};
  }
  return {x: 1, y: 1};
}

function respawnBlocks(state, cx, cy, count) {
  const cols = state.grid[0].length, rows = state.grid.length;
  let placed = 0, tries = 0;
  while (placed < count && tries < 200) {
    tries++;
    const x = Math.max(1, Math.min(cols-2, cx + Math.floor((Math.random()-0.5) * 14)));
    const y = Math.max(1, Math.min(rows-2, cy + Math.floor((Math.random()-0.5) * 14)));
    if (state.grid[y][x] !== EMPTY) continue;
    if (state.beasts.some(b => b.x === x && b.y === y)) continue;
    if (Object.values(state.players).some(p => p.alive && p.x === x && p.y === y)) continue;
    state.grid[y][x] = BLOCK;
    placed++;
  }
}

function resizeWorld(state, newCols, newRows) {
  const oldGrid = state.grid;
  const oldCols = oldGrid[0].length, oldRows = oldGrid.length;
  if (newCols === oldCols && newRows === oldRows) return state;

  if (newCols >= oldCols && newRows >= oldRows) {
    // Grow centrally
    const ox = Math.floor((newCols - oldCols) / 2);
    const oy = Math.floor((newRows - oldRows) / 2);
    const newGrid = [];
    for (let y = 0; y < newRows; y++) {
      const row = [];
      for (let x = 0; x < newCols; x++) {
        if (x === 0 || y === 0 || x === newCols-1 || y === newRows-1) {
          row.push(WALL);
        } else {
          const ix = x - ox, iy = y - oy;
          if (ix > 0 && iy > 0 && ix < oldCols-1 && iy < oldRows-1) {
            row.push(oldGrid[iy][ix]);
          } else {
            // New ring: blocks/walls at original densities
            const r = Math.random();
            if (r < 0.025) row.push(WALL);
            else if (r < 0.32) row.push(BLOCK);
            else row.push(EMPTY);
          }
        }
      }
      newGrid.push(row);
    }
    for (const id in state.players) {
      state.players[id].x += ox;
      state.players[id].y += oy;
    }
    for (const b of state.beasts) {
      b.x += ox; b.y += oy;
    }
    state.grid = newGrid;
  } else {
    // Shrink: regenerate fresh world; replace players
    const newGrid = makeGrid(newCols, newRows);
    state.grid = newGrid;
    state.beasts = [];
    for (const id in state.players) {
      const p = state.players[id];
      const pos = findEmptyCell(newGrid, state.players, state.beasts);
      p.x = pos.x; p.y = pos.y;
    }
    state.beasts = spawnBeasts(newGrid, desiredBeasts(Object.values(state.players).filter(p => p.alive).length || 1), state.players);
  }
  return state;
}

// === GAME LOGIC ===
function applyMove(state, playerId, dx, dy) {
  const player = state.players[playerId];
  if (!player || !player.alive) return false;
  const cols = state.grid[0].length, rows = state.grid.length;
  const nx = player.x + dx, ny = player.y + dy;
  if (nx < 0 || ny < 0 || nx >= cols || ny >= rows) return false;

  const tile = state.grid[ny][nx];
  const beastAt = state.beasts.find(b => b.x === nx && b.y === ny);
  const playerAt = Object.values(state.players).find(p => p.id !== playerId && p.alive && p.x === nx && p.y === ny);

  if (beastAt) { player.alive = false; player.deathTime = Date.now(); return true; }
  if (playerAt) return false;

  if (tile === EMPTY) {
    player.x = nx; player.y = ny;
    return true;
  }
  if (tile === WALL) return false;

  if (tile === BLOCK) {
    let ex = nx, ey = ny;
    while (true) {
      const cx = ex + dx, cy = ey + dy;
      if (cx < 0 || cy < 0 || cx >= cols || cy >= rows) return false;
      const next = state.grid[cy][cx];
      const beastBeyond = state.beasts.find(b => b.x === cx && b.y === cy);
      const playerBeyond = Object.values(state.players).find(p => p.alive && p.x === cx && p.y === cy);

      if (next === EMPTY && !beastBeyond && !playerBeyond) {
        state.grid[cy][cx] = BLOCK;
        state.grid[ny][nx] = EMPTY;
        player.x = nx; player.y = ny;
        return true;
      } else if (next === BLOCK) {
        ex = cx; ey = cy;
        continue;
      } else if (beastBeyond) {
        const bx = cx + dx, by = cy + dy;
        let crush = false;
        if (bx < 0 || by < 0 || bx >= cols || by >= rows) crush = true;
        else {
          const beyond = state.grid[by][bx];
          const beastBehind = state.beasts.find(b => b.x === bx && b.y === by);
          const playerBehind = Object.values(state.players).find(p => p.alive && p.x === bx && p.y === by);
          if (beyond === WALL || beyond === BLOCK || beastBehind || playerBehind) crush = true;
        }
        if (!crush) return false;
        state.beasts = state.beasts.filter(b => !(b.x === cx && b.y === cy));
        state.grid[cy][cx] = BLOCK;
        state.grid[ny][nx] = EMPTY;
        player.x = nx; player.y = ny;
        return true;
      } else if (playerBeyond) {
        return false;
      } else {
        return false;
      }
    }
  }
  return false;
}

function moveBeast(state, beast) {
  const cols = state.grid[0].length, rows = state.grid.length;
  let nearest = null, minDist = Infinity;
  for (const id in state.players) {
    const p = state.players[id];
    if (!p.alive) continue;
    const d = Math.abs(p.x - beast.x) + Math.abs(p.y - beast.y);
    if (d < minDist) { minDist = d; nearest = p; }
  }
  if (!nearest) return;

  const dx = Math.sign(nearest.x - beast.x);
  const dy = Math.sign(nearest.y - beast.y);
  const adx = Math.abs(nearest.x - beast.x), ady = Math.abs(nearest.y - beast.y);
  const tries = adx > ady
    ? [[dx,0],[0,dy],[dx,dy],[0,dy||1],[dx||1,0]]
    : [[0,dy],[dx,0],[dx,dy],[dx||1,0],[0,dy||1]];

  for (const [mx, my] of tries) {
    if (mx === 0 && my === 0) continue;
    const nx = beast.x + mx, ny = beast.y + my;
    if (nx < 0 || ny < 0 || nx >= cols || ny >= rows) continue;
    if (state.grid[ny][nx] !== EMPTY) continue;
    if (state.beasts.some(b => b !== beast && b.x === nx && b.y === ny)) continue;
    const pAt = Object.values(state.players).find(p => p.alive && p.x === nx && p.y === ny);
    if (pAt) {
      pAt.alive = false;
      pAt.deathTime = Date.now();
      beast.x = nx; beast.y = ny;
      return;
    }
    beast.x = nx; beast.y = ny;
    return;
  }
}

function isHost() {
  if (!state || !state.players || !myId) return false;
  const alive = Object.values(state.players).filter(p => p.alive && Date.now() - p.heartbeat < PLAYER_TIMEOUT);
  if (alive.length === 0) return true;
  alive.sort((a, b) => a.id.localeCompare(b.id));
  return alive[0].id === myId;
}

async function hostTick() {
  if (!state) return;
  let changed = false;
  const now = Date.now();
  state.lastInputSeq = state.lastInputSeq || {};

  // Apply per-player input updates
  for (const id in state.players) {
    const input = await readPlayerInput(id);
    if (!input) continue;
    const p = state.players[id];
    if (!p) continue;
    if (typeof input.heartbeat === 'number') {
      p.heartbeat = Math.max(p.heartbeat || 0, input.heartbeat);
    }
    if (input.leave) {
      respawnBlocks(state, p.x, p.y, 10);
      delete state.players[id];
      delete state.lastInputSeq[id];
      changed = true;
      continue;
    }
    const lastSeq = state.lastInputSeq[id] || 0;
    if (typeof input.seq === 'number' && input.seq > lastSeq) {
      state.lastInputSeq[id] = input.seq;
      if (Number.isInteger(input.dx) && Number.isInteger(input.dy)) {
        if (applyMove(state, id, Math.max(-1, Math.min(1, input.dx)), Math.max(-1, Math.min(1, input.dy)))) {
          changed = true;
        }
      }
    }
  }

  // Clean dead/disconnected players
  if (now - lastCleanTick > 1500) {
    lastCleanTick = now;
    for (const id in state.players) {
      const p = state.players[id];
      const stale = now - p.heartbeat > PLAYER_TIMEOUT;
      const deadAndLingered = !p.alive && p.deathTime && now - p.deathTime > DEATH_LINGER;
      if (stale || deadAndLingered) {
        respawnBlocks(state, p.x, p.y, 10);
        delete state.players[id];
        delete state.lastInputSeq[id];
        changed = true;
      }
    }
    // Resize down if many players left
    const aliveCount = Object.values(state.players).filter(p => p.alive).length;
    const desired = desiredSize(Math.max(1, aliveCount));
    const cur = { cols: state.grid[0].length, rows: state.grid.length };
    // Only shrink, don't grow here (grow happens on join)
    if (desired.cols < cur.cols || desired.rows < cur.rows) {
      state = resizeWorld(state, Math.max(BASE_COLS, desired.cols), Math.max(BASE_ROWS, desired.rows));
      changed = true;
    }
    // Top up beasts if too few
    const wantBeasts = desiredBeasts(Math.max(1, aliveCount));
    if (state.beasts.length < wantBeasts) {
      const more = spawnBeasts(state.grid, wantBeasts - state.beasts.length, state.players);
      state.beasts.push(...more);
      changed = true;
    }
  }

  // Move beasts
  const beastSpeed = Math.max(450, 900 - Object.values(state.players).filter(p=>p.alive).length * 40);
  if (now - lastBeastTick > beastSpeed) {
    lastBeastTick = now;
    for (const beast of [...state.beasts]) {
      moveBeast(state, beast);
    }
    changed = true;
  }

  if (changed) await writeRemote(state);
}

// === RENDER ===
let cameraX = 0, cameraY = 0;

function render() {
  const w = window.innerWidth, h = window.innerHeight;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, w, h);
  if (!state) return;

  const grid = state.grid;
  const cols = grid[0].length, rows = grid.length;
  const me = state.players[myId];
  const targetX = me ? me.x : cols/2;
  const targetY = me ? me.y : rows/2;
  cameraX = targetX * CELL - w/2 + CELL/2;
  cameraY = targetY * CELL - h/2 + CELL/2;

  const sx = Math.max(0, Math.floor(cameraX / CELL));
  const sy = Math.max(0, Math.floor(cameraY / CELL));
  const ex = Math.min(cols, Math.ceil((cameraX + w) / CELL) + 1);
  const ey = Math.min(rows, Math.ceil((cameraY + h) / CELL) + 1);

  for (let y = sy; y < ey; y++) {
    for (let x = sx; x < ex; x++) {
      const v = grid[y][x];
      if (v === EMPTY) continue;
      const px = Math.round(x * CELL - cameraX);
      const py = Math.round(y * CELL - cameraY);
      drawTile(v, px, py);
    }
  }

  // Beasts
  ctx.font = `${CELL - 2}px VT323, monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ff4040';
  for (const b of state.beasts) {
    if (b.x < sx-1 || b.x > ex || b.y < sy-1 || b.y > ey) continue;
    const px = Math.round(b.x * CELL - cameraX);
    const py = Math.round(b.y * CELL - cameraY);
    ctx.fillText('♦', px + CELL/2, py + CELL/2 + 1);
  }

  // Players
  ctx.font = `bold ${CELL - 4}px VT323, monospace`;
  for (const id in state.players) {
    const p = state.players[id];
    if (p.x < sx-1 || p.x > ex || p.y < sy-1 || p.y > ey) continue;
    const px = Math.round(p.x * CELL - cameraX);
    const py = Math.round(p.y * CELL - cameraY);
    ctx.fillStyle = p.alive ? p.color : 'rgba(120,120,120,0.5)';
    ctx.fillText(p.glyph, px + CELL/2, py + CELL/2 + 1);
    if (id === myId && p.alive) {
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 1;
      ctx.strokeRect(px+1.5, py+1.5, CELL-3, CELL-3);
    }
  }
}

function drawTile(v, px, py) {
  if (v === WALL) {
    ctx.fillStyle = '#5ac8ff';
    ctx.fillRect(px, py, CELL, CELL);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    for (let dy = 0; dy < CELL; dy += 4) {
      const offset = (Math.floor(dy/4) % 2 === 0) ? 0 : 2;
      for (let dx = offset; dx < CELL; dx += 4) {
        ctx.fillRect(px + dx, py + dy, 2, 2);
      }
    }
  } else if (v === BLOCK) {
    ctx.fillStyle = '#7a7a7a';
    ctx.fillRect(px, py, CELL, CELL);
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    for (let dy = 0; dy < CELL; dy += 3) {
      const offset = (Math.floor(dy/3) % 2 === 0) ? 0 : 1;
      for (let dx = offset; dx < CELL; dx += 3) {
        ctx.fillRect(px + dx, py + dy, 1, 1);
      }
    }
  }
}

let rafId;
function startRenderLoop() {
  function loop() {
    render();
    rafId = requestAnimationFrame(loop);
  }
  loop();
}

// === HUD ===
function updateHUD() {
  if (!state) return;
  document.getElementById('beasts').textContent = state.beasts.length;
  const alive = Object.values(state.players).filter(p => p.alive);
  document.getElementById('players').textContent = alive.length;
  const list = document.getElementById('playerList');
  list.innerHTML = alive.map(p =>
    `<span style="color:${p.color}${p.id === myId ? ';text-shadow:0 0 4px '+p.color : ''}">${p.glyph}</span>`
  ).join('');
}

// === SYNC LOOP ===
async function pollLoop() {
  try {
    const remote = await readRemote();
    if (remote) {
      // Merge: take remote, but preserve local move that may not be reflected yet
      // For simplicity: take remote as truth
      state = remote;
      updateHUD();
    }
    if (myId && state && state.players[myId]) {
      // Update local heartbeat
      state.players[myId].heartbeat = Date.now();
      if (Date.now() - lastHeartbeat > HEARTBEAT_INTERVAL) {
        lastHeartbeat = Date.now();
        if (isHost()) await pushState();
        else writeMyInput({ seq: localInputSeq, heartbeat: lastHeartbeat });
      }
    }
    if (isHost()) {
      await hostTick();
    }
    // Death detection
    if (myId && state && state.players[myId] && !state.players[myId].alive && myAlive) {
      myAlive = false;
      showDeath();
    }
  } catch (e) {
    console.error('poll error', e);
  }
  setTimeout(pollLoop, POLL_INTERVAL);
}

// === INPUT ===
function tryMove(dx, dy) {
  if (!state || !myId || !state.players[myId] || !state.players[myId].alive) return;
  if (isHost()) {
    if (applyMove(state, myId, dx, dy)) {
      pushState();
      if (!state.players[myId].alive) {
        myAlive = false;
        showDeath();
      }
    }
    return;
  }
  if (applyMove(state, myId, dx, dy)) {
    if (!state.players[myId].alive) {
      myAlive = false;
      showDeath();
    }
  }
  localInputSeq += 1;
  writeMyInput({ seq: localInputSeq, dx, dy, heartbeat: Date.now() });
}

const keyMap = {
  ArrowUp:[0,-1], w:[0,-1], W:[0,-1], k:[0,-1],
  ArrowDown:[0,1], s:[0,1], S:[0,1], j:[0,1],
  ArrowLeft:[-1,0], a:[-1,0], A:[-1,0], h:[-1,0],
  ArrowRight:[1,0], d:[1,0], D:[1,0], l:[1,0],
};
document.addEventListener('keydown', e => {
  const m = keyMap[e.key];
  if (m) { e.preventDefault(); tryMove(m[0], m[1]); }
});

const dirMap = { up:[0,-1], down:[0,1], left:[-1,0], right:[1,0] };
document.querySelectorAll('.btn[data-dir]').forEach(btn => {
  let t;
  const fire = () => tryMove.apply(null, dirMap[btn.dataset.dir]);
  const start = e => {
    e.preventDefault();
    fire();
    clearInterval(t);
    t = setInterval(fire, 170);
  };
  const stop = () => clearInterval(t);
  btn.addEventListener('touchstart', start, { passive: false });
  btn.addEventListener('touchend', stop);
  btn.addEventListener('touchcancel', stop);
  btn.addEventListener('mousedown', start);
  btn.addEventListener('mouseup', stop);
  btn.addEventListener('mouseleave', stop);
});

// === JOIN UI ===
let selectedGlyph = null;
let selectedColor = COLORS[0];

function renderGlyphPicker(taken) {
  const c = document.getElementById('glyphPicker');
  c.innerHTML = '';
  GLYPHS.forEach(g => {
    const b = document.createElement('button');
    b.className = 'glyph-btn';
    b.textContent = g;
    if (taken.includes(g)) b.classList.add('taken');
    if (g === selectedGlyph) b.classList.add('selected');
    b.disabled = taken.includes(g);
    b.onclick = () => {
      if (taken.includes(g)) return;
      selectedGlyph = g;
      renderGlyphPicker(taken);
      document.getElementById('joinBtn').disabled = false;
    };
    c.appendChild(b);
  });
}

function renderColorPicker() {
  const c = document.getElementById('colorPicker');
  c.innerHTML = '';
  COLORS.forEach(col => {
    const b = document.createElement('button');
    b.className = 'color-btn';
    b.style.background = col;
    if (col === selectedColor) b.classList.add('selected');
    b.onclick = () => { selectedColor = col; renderColorPicker(); };
    c.appendChild(b);
  });
}

async function refreshJoinUI() {
  const remote = await readRemote();
  const taken = remote
    ? Object.values(remote.players).filter(p => Date.now() - p.heartbeat < PLAYER_TIMEOUT).map(p => p.glyph)
    : [];
  renderGlyphPicker(taken);
  renderColorPicker();
}

async function doJoin() {
  if (!selectedGlyph) return;
  myId = genId();
  myGlyph = selectedGlyph;
  myColor = selectedColor;
  myAlive = true;

  let remote = await readRemote();
  if (!remote || !remote.grid) {
    const sz = desiredSize(1);
    remote = {
      grid: makeGrid(sz.cols, sz.rows),
      beasts: [],
      players: {},
      updated: Date.now(),
    };
  } else {
    // Grow world for new player
    const aliveCount = Object.values(remote.players).filter(p => p.alive && Date.now() - p.heartbeat < PLAYER_TIMEOUT).length;
    const sz = desiredSize(aliveCount + 1);
    const cur = { cols: remote.grid[0].length, rows: remote.grid.length };
    if (sz.cols > cur.cols || sz.rows > cur.rows) {
      remote = resizeWorld(remote, Math.max(sz.cols, cur.cols), Math.max(sz.rows, cur.rows));
    }
  }

  const pos = findEmptyCell(remote.grid, remote.players, remote.beasts);
  remote.players[myId] = {
    id: myId, glyph: myGlyph, color: myColor,
    x: pos.x, y: pos.y, alive: true, heartbeat: Date.now(),
  };

  if (remote.beasts.length === 0) {
    remote.beasts = spawnBeasts(remote.grid, desiredBeasts(1), remote.players);
  } else {
    // Top up
    const want = desiredBeasts(Object.values(remote.players).filter(p => p.alive).length);
    if (remote.beasts.length < want) {
      remote.beasts.push(...spawnBeasts(remote.grid, want - remote.beasts.length, remote.players));
    }
  }

  state = remote;
  localInputSeq = 0;
  await writeRemote(state);
  await writeMyInput({ seq: localInputSeq, heartbeat: Date.now() });

  document.getElementById('joinOverlay').classList.add('hidden');
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('controls').classList.remove('hidden');
  document.getElementById('playerList').classList.remove('hidden');

  startRenderLoop();
  pollLoop();
}

function showDeath() {
  document.getElementById('deathOverlay').classList.remove('hidden');
}

document.getElementById('joinBtn').addEventListener('click', doJoin);

document.getElementById('rejoinBtn').addEventListener('click', async () => {
  document.getElementById('deathOverlay').classList.add('hidden');
  let remote = await readRemote();
  if (!remote) return;
  const pos = findEmptyCell(remote.grid, remote.players, remote.beasts);
  remote.players[myId] = {
    id: myId, glyph: myGlyph, color: myColor,
    x: pos.x, y: pos.y, alive: true, heartbeat: Date.now(),
  };
  state = remote;
  myAlive = true;
  localInputSeq = 0;
  await writeRemote(state);
  await writeMyInput({ seq: localInputSeq, heartbeat: Date.now() });
});

// Cleanup on close
window.addEventListener('beforeunload', () => {
  if (myId) {
    try {
      window.storage.set(inputKey(myId), JSON.stringify({
        id: myId, leave: true, seq: localInputSeq, heartbeat: Date.now(), ts: Date.now(),
      }), true);
    } catch (e) {}
  }
  if (isHost() && myId && state && state.players[myId]) {
    delete state.players[myId];
    try {
      // Best-effort sync write — may not complete
      window.storage.set(STORAGE_KEY, JSON.stringify({...state, updated: Date.now()}), true);
    } catch(e) {}
  }
});

// === BOOT ===
refreshJoinUI();
setInterval(() => { if (!myId) refreshJoinUI(); }, 3000);
</script>
