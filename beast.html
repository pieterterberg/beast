<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1">
<title>BEAST — multiplayer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
:root {
  --phosphor: #6dff8a;
  --beast: #ff4040;
  --wall: #5ac8ff;
  --block: #888;
  --amber: #ffb000;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #000;
  color: var(--phosphor);
  font-family: 'VT323', 'Courier New', monospace;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
canvas {
  position: fixed;
  inset: 0;
  display: block;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
    rgba(0,0,0,0.18) 3px, rgba(0,0,0,0) 4px
  );
  pointer-events: none; z-index: 50;
}
.hud {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 60;
  display: flex;
  justify-content: space-between;
  padding: 6px 14px;
  font-size: 22px;
  letter-spacing: 2px;
  color: var(--amber);
  background: linear-gradient(to bottom, rgba(0,0,0,0.85), rgba(0,0,0,0));
  pointer-events: none;
}
.hud b { color: #fff; margin-left: 4px; }
.player-list {
  position: fixed;
  top: 36px; right: 14px;
  z-index: 55;
  font-size: 22px;
  text-align: right;
  line-height: 1.1;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.player-list span { display: inline-block; }
.controls {
  position: fixed;
  bottom: 14px;
  right: 14px;
  z-index: 60;
  display: grid;
  grid-template-columns: repeat(3, 52px);
  grid-template-rows: repeat(3, 52px);
  gap: 4px;
}
@media (min-width: 900px) and (hover: hover) and (pointer: fine) {
  .controls { display: none; }
}
.btn {
  background: rgba(0,0,0,0.55);
  border: 1px solid rgba(109,255,138,0.4);
  color: var(--phosphor);
  font-family: inherit;
  font-size: 26px;
  cursor: pointer;
  border-radius: 3px;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
}
.btn:active { background: rgba(109,255,138,0.25); }
.btn.empty-btn { visibility: hidden; }
.overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.96);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px;
  z-index: 200;
  text-align: center;
  padding: 24px;
  overflow-y: auto;
}
.overlay h1 {
  font-size: clamp(56px, 13vw, 110px);
  letter-spacing: 12px;
  color: var(--phosphor);
  margin-right: -12px;
}
.overlay p {
  font-size: clamp(16px, 4vw, 22px);
  color: var(--amber);
  line-height: 1.4;
  max-width: 400px;
}
.overlay .small {
  font-size: 16px;
  color: rgba(109,255,138,0.5);
  max-width: 360px;
}
.glyphs {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 6px;
  max-width: 420px;
  width: 100%;
}
.glyph-btn {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(109,255,138,0.3);
  color: var(--phosphor);
  font-family: inherit;
  font-size: 26px;
  padding: 8px 0;
  cursor: pointer;
  border-radius: 3px;
  line-height: 1;
}
.glyph-btn.taken {
  opacity: 0.2;
  cursor: not-allowed;
  border-color: #333;
  color: #555;
}
.glyph-btn.selected {
  background: rgba(109,255,138,0.25);
  border-color: var(--phosphor);
}
.colors {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.color-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  border: 2px solid #333;
  cursor: pointer;
  padding: 0;
}
.color-btn.selected {
  border-color: #fff;
  transform: scale(1.15);
}
.start-btn {
  margin-top: 8px;
  padding: 12px 32px;
  background: transparent;
  border: 2px solid var(--phosphor);
  color: var(--phosphor);
  font-family: inherit;
  font-size: 26px;
  letter-spacing: 6px;
  cursor: pointer;
  border-radius: 4px;
}
.start-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.start-btn:active:not(:disabled) { background: rgba(109,255,138,0.18); }
.hidden { display: none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div class="hud hidden" id="hud">
  <span>BEASTS<b id="beasts">0</b></span>
  <span>PLAYERS<b id="players">0</b></span>
</div>

<div class="player-list hidden" id="playerList"></div>

<div class="controls hidden" id="controls">
  <div class="btn empty-btn"></div>
  <button class="btn" data-dir="up">▲</button>
  <div class="btn empty-btn"></div>
  <button class="btn" data-dir="left">◀</button>
  <div class="btn empty-btn"></div>
  <button class="btn" data-dir="right">▶</button>
  <div class="btn empty-btn"></div>
  <button class="btn" data-dir="down">▼</button>
  <div class="btn empty-btn"></div>
</div>

<div class="overlay" id="joinOverlay">
  <h1>BEAST</h1>
  <p>Pick a glyph. The world grows for every visitor.</p>
  <div class="glyphs" id="glyphPicker"></div>
  <div class="colors" id="colorPicker"></div>
  <p class="small">Your position is shared with everyone on this page. Push blocks to crush beasts. Don't get touched.</p>
  <p class="small" id="joinError"></p>
  <button class="start-btn" id="joinBtn" disabled>▶ JOIN</button>
</div>

<div class="overlay hidden" id="deathOverlay">
  <h1>DEAD</h1>
  <p>The beasts feed on what's left of you.</p>
  <button class="start-btn" id="rejoinBtn">▶ REJOIN</button>
</div>

<script src="./shared/constants.js"></script>
<script src="./client.js"></script>
</body>
</html>
